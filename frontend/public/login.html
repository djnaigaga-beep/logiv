<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to Ugazo - Sophisticated dating platform">
  <title>Login | Ugazo Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin-bottom: 0;
      font-weight: 500;
      color: #666;
      cursor: pointer;
    }

    .remember-forgot a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .remember-forgot a:hover {
      text-decoration: underline;
    }

    .error {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .alert {
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: none;
    }

    .alert.error.show {
      display: block;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transition: all 0.3s;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #666;
    }

    .footer-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      position: relative;
      color: #999;
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 48%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .social-btn {
      padding: 12px;
      border: 2px solid #e0e0e0;
      background: white;
      color: #1a1a2e;
      font-weight: 600;
      transition: all 0.3s;
      cursor: pointer;
      font-size: 14px;
    }

    .social-btn:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }

    .demo-note {
      background: #f0f0f0;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .container {
        border-radius: 15px;
      }

      .header h1 {
        font-size: 32px;
      }

      .content {
        padding: 30px 20px;
      }

      .social-login {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Ugazo</h1>
      <p>Welcome Back</p>
    </div>

    <div class="content">
      <div class="alert error" id="alertMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
          <div class="error" id="passwordError"></div>
        </div>

        <div class="remember-forgot">
          <div class="checkbox-group">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" onclick="alert('Password reset feature coming soon!')">Forgot password?</a>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div class="divider">or</div>

      <div class="social-login">
        <button class="social-btn" onclick="alert('Social login coming soon!')">🔵 Facebook</button>
        <button class="social-btn" onclick="alert('Social login coming soon!')">🔴 Google</button>
      </div>

      <div class="demo-note">
        📝 Demo credentials: Email: test@ugazo.com | Password: password123
      </div>

      <div class="footer-text">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000';

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showError(elementId, message) {
      const error = document.getElementById(elementId);
      error.textContent = message;
      error.classList.add('show');
    }

    function clearErrors() {
      document.querySelectorAll('.error').forEach(e => {
        e.classList.remove('show');
        e.textContent = '';
      });
      document.getElementById('alertMessage').classList.remove('show');
    }

    function showAlert(message) {
      const alert = document.getElementById('alertMessage');
      alert.textContent = message;
      alert.classList.add('show');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const button = e.target.querySelector('button[type="submit"]');

      let isValid = true;

      if (!email) {
        showError('emailError', 'Please enter your email');
        isValid = false;
      } else if (!isValidEmail(email)) {
        showError('emailError', 'Please enter a valid email address');
        isValid = false;
      }

      if (!password) {
        showError('passwordError', 'Please enter your password');
        isValid = false;
      }

      if (!isValid) return;

      button.disabled = true;
      button.textContent = 'Signing in...';

      try {
        const response = await fetch(`${API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          if (document.getElementById('remember').checked) {
            localStorage.setItem('rememberMe', 'true');
          }

          showAlert('✓ Login successful! Redirecting...');
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          showAlert(data.message || 'Login failed. Please try again.');
          button.disabled = false;
          button.textContent = 'Sign In';
        }
      } catch (error) {
        showAlert('Network error. Please check if the backend server is running.');
        button.disabled = false;
        button.textContent = 'Sign In';
      }
    });

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
