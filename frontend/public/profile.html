<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View profile on Ugazo">
  <title>User Profile | Ugazo Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
    }

    nav {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-decoration: none;
      color: white;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(102, 126, 234, 0.2);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #f8d7da;
      color: #721c24;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin: 30px 0;
      border: 1px solid #f5c6cb;
    }

    .no-auth {
      text-align: center;
      padding: 60px 20px;
    }

    .no-auth a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }

    .profile-container {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-header {
      position: relative;
      height: 400px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
    }

    .profile-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-header-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
    }

    .gallery-indicator {
      position: absolute;
      bottom: 15px;
      right: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.3);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-nav:hover {
      background: rgba(0, 0, 0, 0.5);
    }

    .gallery-prev {
      left: 15px;
    }

    .gallery-next {
      right: 15px;
    }

    .profile-content {
      padding: 40px;
    }

    .profile-header-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 20px;
    }

    .profile-name-age {
      flex: 1;
    }

    .profile-name {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .profile-meta {
      display: flex;
      gap: 20px;
      font-size: 16px;
      color: #666;
      margin-bottom: 10px;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button, a.btn {
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    .btn-love {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      color: white;
    }

    .btn-love:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
    }

    .btn-back {
      background: #f0f0f0;
      color: #1a1a2e;
    }

    .btn-back:hover {
      background: #e0e0e0;
    }

    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .bio-text {
      font-size: 16px;
      line-height: 1.8;
      color: #555;
      background: #f8f9ff;
      padding: 20px;
      border-radius: 10px;
      border-left: 4px solid #667eea;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .info-card {
      background: #f8f9ff;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
    }

    .info-label {
      font-size: 12px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .gallery-section {
      margin-top: 30px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    .gallery-item {
      position: relative;
      width: 100%;
      padding-bottom: 100%;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }

    .gallery-item:hover {
      transform: scale(1.05);
    }

    .gallery-item img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-item video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: rgba(102, 126, 234, 0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .gallery-item:hover .play-icon {
      opacity: 1;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90vh;
      position: relative;
    }

    .modal-media {
      max-width: 800px;
      max-height: 600px;
      width: auto;
      height: auto;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: none;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      padding: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .modal-close:hover {
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .profile-content {
        padding: 25px;
      }

      .profile-name {
        font-size: 28px;
      }

      .profile-header-info {
        flex-direction: column;
      }

      .profile-actions {
        width: 100%;
      }

      button, a.btn {
        flex: 1;
        min-width: 120px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .section-title {
        font-size: 18px;
      }

      .profile-header {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="nav-left">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <a href="dashboard.html" class="logo">Ugazo</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div id="loadingMessage" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p style="margin-top: 15px;">Loading profile...</p>
    </div>

    <div id="errorMessage" class="error-message" style="display: none;"></div>

    <div id="noAuthState" class="no-auth" style="display: none;">
      <h3>🔐 Please login to view profiles</h3>
      <p>Sign in to your Ugazo account to view other user profiles</p>
      <a href="login.html">Go to Login</a>
    </div>

    <div class="profile-container" id="profileContainer" style="display: none;">
      <!-- Profile Header with Photo Gallery -->
      <div class="profile-header" id="profileHeader">
        <div class="profile-header-placeholder">👤</div>
        <button class="gallery-nav gallery-prev" onclick="previousPhoto()">‹</button>
        <button class="gallery-nav gallery-next" onclick="nextPhoto()">›</button>
        <div class="gallery-indicator">
          <span id="photoIndicator">1</span> / <span id="photoTotal">1</span>
        </div>
      </div>

      <!-- Profile Content -->
      <div class="profile-content">
        <!-- Name, Age, Location -->
        <div class="profile-header-info">
          <div class="profile-name-age">
            <div class="profile-name" id="profileName">Loading...</div>
            <div class="profile-meta">
              <span id="profileAge">Age Unknown</span>
              <span>📍 <span id="profileLocation">Loading...</span></span>
              <span id="profileGender">👤 Unknown</span>
            </div>
          </div>
          <div class="profile-actions">
            <button class="btn btn-love" onclick="sendLoveRequest()">❤️ Send Love Request (€50)</button>
          </div>
        </div>

        <!-- Bio Section -->
        <div class="section" id="bioSection" style="display: none;">
          <div class="section-title">📝 About</div>
          <div class="bio-text" id="profileBio"></div>
        </div>

        <!-- Info Cards -->
        <div class="section">
          <div class="section-title">ℹ️ Profile Information</div>
          <div class="info-grid">
            <div class="info-card">
              <div class="info-label">Country</div>
              <div class="info-value" id="infoCountry">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">Gender</div>
              <div class="info-value" id="infoGender">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">Looking For</div>
              <div class="info-value" id="infoLooking">-</div>
            </div>
            <div class="info-card">
              <div class="info-label">Profile Status</div>
              <div class="info-value" id="infoStatus">Active</div>
            </div>
          </div>
        </div>

        <!-- Gallery Section -->
        <div class="gallery-section" id="gallerySection" style="display: none;">
          <div class="section-title">🎬 Gallery</div>
          <div class="gallery-grid" id="profileGallery"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Media Modal -->
  <div class="modal" id="mediaModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeMediaModal()">×</button>
      <div id="modalMediaContainer" style="text-align: center;"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000';
    let currentProfile = null;
    let currentPhotoIndex = 0;
    let profilePhotos = [];

    // Get user ID from URL
    function getUserIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // Check authentication
    function checkAuth() {
      const token = localStorage.getItem('token');
      if (!token) {
        document.getElementById('noAuthState').style.display = 'block';
        return false;
      }
      return true;
    }

    // Load profile
    async function loadProfile() {
      if (!checkAuth()) return;

      const userId = getUserIdFromURL();

      if (!userId) {
        showError('No user ID provided');
        return;
      }

      document.getElementById('loadingMessage').style.display = 'block';

      try {
        const response = await fetch(`${API_URL}/api/users/${userId}`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });

        if (response.ok) {
          currentProfile = await response.json();
          profilePhotos = currentProfile.photos || [];
          currentPhotoIndex = 0;
          displayProfile();
        } else if (response.status === 404) {
          showError('Profile not found');
        } else {
          showError('Failed to load profile');
        }
      } catch (error) {
        console.error('Error loading profile:', error);
        showError('Error loading profile. Please try again.');
      } finally {
        document.getElementById('loadingMessage').style.display = 'none';
      }
    }

    // Display profile
    function displayProfile() {
      document.getElementById('profileContainer').style.display = 'block';

      const age = calculateAge(new Date(currentProfile.birthdate));
      const gender = currentProfile.gender === 'Female' ? '👩 Female' : '👨 Male';

      // Update header info
      document.getElementById('profileName').textContent = `${currentProfile.firstName}, ${age}`;
      document.getElementById('profileAge').textContent = `${age} years old`;
      document.getElementById('profileLocation').textContent = currentProfile.country;
      document.getElementById('profileGender').textContent = gender;

      // Update info cards
      document.getElementById('infoCountry').textContent = currentProfile.country;
      document.getElementById('infoGender').textContent = gender;
      document.getElementById('infoLooking').textContent = currentProfile.gender === 'Female' ? 'Men' : 'Women';

      // Update bio
      if (currentProfile.bio) {
        document.getElementById('profileBio').textContent = currentProfile.bio;
        document.getElementById('bioSection').style.display = 'block';
      }

      // Update photo
      updateMainPhoto();

      // Display photo indicator
      document.getElementById('photoTotal').textContent = profilePhotos.length || 1;

      // Display gallery
      if (profilePhotos.length > 1) {
        displayGallery();
      }
    }

    // Update main photo
    function updateMainPhoto() {
      const header = document.getElementById('profileHeader');
      const indicator = document.getElementById('photoIndicator');

      if (profilePhotos.length > 0) {
        header.innerHTML = `
          <img src="${profilePhotos[currentPhotoIndex]}" alt="Profile Photo">
          <button class="gallery-nav gallery-prev" onclick="previousPhoto()">‹</button>
          <button class="gallery-nav gallery-next" onclick="nextPhoto()">›</button>
          <div class="gallery-indicator">
            <span id="photoIndicator">${currentPhotoIndex + 1}</span> / <span id="photoTotal">${profilePhotos.length}</span>
          </div>
        `;
      }
    }

    // Photo navigation
    function nextPhoto() {
      if (profilePhotos.length > 0) {
        currentPhotoIndex = (currentPhotoIndex + 1) % profilePhotos.length;
        updateMainPhoto();
      }
    }

    function previousPhoto() {
      if (profilePhotos.length > 0) {
        currentPhotoIndex = (currentPhotoIndex - 1 + profilePhotos.length) % profilePhotos.length;
        updateMainPhoto();
      }
    }

    // Display gallery
    function displayGallery() {
      const gallery = document.getElementById('profileGallery');
      gallery.innerHTML = '';

      profilePhotos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.onclick = () => openMediaModal(photo);
        item.innerHTML = `<img src="${photo}" alt="Gallery ${index + 1}">`;
        gallery.appendChild(item);
      });

      document.getElementById('gallerySection').style.display = 'block';
    }

    // Media modal
    function openMediaModal(media) {
      const container = document.getElementById('modalMediaContainer');
      container.innerHTML = `<img src="${media}" alt="Media" class="modal-media">`;
      document.getElementById('mediaModal').classList.add('show');
    }

    function closeMediaModal() {
      document.getElementById('mediaModal').classList.remove('show');
    }

    // Send love request
    async function sendLoveRequest() {
      if (!currentProfile) return;

      const token = localStorage.getItem('token');
      if (!token) {
        alert('Please login to send love requests');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/match/love-request`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ recipientId: currentProfile._id })
        });

        const data = await response.json();

        if (response.ok) {
          alert('💕 Love request sent! If they love you back, you\'ll match!');
        } else {
          alert(data.message || 'Failed to send love request. (€50 payment required)');
        }
      } catch (error) {
        alert('Error sending love request. Please try again.');
      }
    }

    // Calculate age
    function calculateAge(birthDate) {
      const today = new Date();
      let age = today.getFullYear() - birthDate.getFullYear();
      const monthDiff = today.getMonth() - birthDate.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
        age--;
      }
      return age;
    }

    // Show error
    function showError(message) {
      const error = document.getElementById('errorMessage');
      error.textContent = message;
      error.style.display = 'block';
    }

    // Go back
    function goBack() {
      window.history.back();
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextPhoto();
      if (e.key === 'ArrowLeft') previousPhoto();
      if (e.key === 'Escape') closeMediaModal();
    });

    // Load on page load
    window.addEventListener('load', loadProfile);
  </script>
</body>
</html>
